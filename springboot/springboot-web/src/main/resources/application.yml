server:
  port: 9090
spring:
  config:
    import: optional:classpath:application-local.yml
  datasource:
    # PostgreSQL 数据源配置
    url: ${DB_URL:jdbc:postgresql://localhost:5432/springboot_vue?currentSchema=public&sslmode=disable}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

springdoc:
  writer-with-order-by-keys: false

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.xinmengqaq.springboot.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:}
  expire-seconds: 86400
  clock-skew-seconds: 120
